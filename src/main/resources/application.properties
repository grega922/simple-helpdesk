# Database (DevServices auto-starts PostgreSQL in dev/test mode)
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.database.generation=drop-and-create

# Flyway schema migration
quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.schema-management.strategy=none

# Production database config
%prod.quarkus.datasource.username=helpdesk
%prod.quarkus.datasource.password=helpdesk
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/helpdesk_db

mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=simple-helpdesk
smallrye.jwt.sign.key.location=privateKey.pem

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.info-title=Simple Helpdesk API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=REST API for a helpdesk chat system. Users create support conversations, operators claim and respond to them.
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=BearerAuth
quarkus.smallrye-openapi.security-scheme-description=JWT Bearer token obtained from /v1/auth/login