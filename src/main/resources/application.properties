# Database (DevServices auto-starts PostgreSQL in dev/test mode)
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.database.generation=drop-and-create

# Production database config
%prod.quarkus.datasource.username=helpdesk
%prod.quarkus.datasource.password=helpdesk
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/helpdesk_db
